server {
    listen 443 ssl http2;
    server_name admin.pawpalai.cn;

    ssl_certificate /etc/letsencrypt/live/admin.pawpalai.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.pawpalai.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/admin.pawpalai.cn.access.log;
    error_log /var/log/nginx/admin.pawpalai.cn.error.log;
}

server {
    listen 80;
    server_name admin.pawpalai.cn;
    return 301 https://$host$request_uri;
}
