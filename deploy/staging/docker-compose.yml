services:
  postgres:
    image: postgres:15-alpine
    container_name: petstore-staging-postgres
    environment:
      POSTGRES_USER: petshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petshop123}
      POSTGRES_DB: petshop_staging
    ports:
      - "5433:5432"
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petshop -d petshop_staging"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - petstore_staging

  redis:
    image: redis:7-alpine
    container_name: petstore-staging-redis
    ports:
      - "6380:6379"
    volumes:
      - staging_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - petstore_staging

  meilisearch:
    image: getmeili/meilisearch:v1.14
    container_name: petstore-staging-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-petshop-meili-key}
    ports:
      - "7701:7700"
    volumes:
      - staging_meilisearch_data:/meili_data
    restart: unless-stopped
    networks:
      - petstore_staging

  backend:
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    container_name: petstore-staging-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://petshop:${POSTGRES_PASSWORD:-petshop123}@postgres:5432/petshop_staging
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      WECHAT_APP_ID: ${WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-deepseek-v4-flash}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
      APP_ENV: dev
      DEBUG: ${DEBUG:-true}
    env_file:
      - ../../backend/.env.dev
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - staging_backend_logs:/app/logs
    networks:
      - petstore_staging

volumes:
  staging_postgres_data:
  staging_redis_data:
  staging_meilisearch_data:
  staging_backend_logs:

networks:
  petstore_staging:
    driver: bridge
