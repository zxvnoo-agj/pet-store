server {
    listen 443 ssl http2;
    server_name staging.api.pawpalai.cn;

    ssl_certificate /etc/letsencrypt/live/staging.api.pawpalai.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.api.pawpalai.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location /v1/chat/stream {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/staging.api.pawpalai.cn.access.log;
    error_log /var/log/nginx/staging.api.pawpalai.cn.error.log;
}

server {
    listen 80;
    server_name staging.api.pawpalai.cn;
    return 301 https://$host$request_uri;
}
